security:
    # Pas de hashage : tout passe par OIDC, aucun mot de passe stocké côté app.

    providers:
        # Provider applicatif : charge les User par leur authentikId.
        # Implémente OidcUserProviderInterface (drenso) en plus de UserProviderInterface
        # pour piloter la réconciliation au login.
        app_user_provider:
            id: App\Security\OidcUserProvider

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        main:
            lazy: true
            provider: app_user_provider

            # Authenticator OIDC drenso (cf. config/packages/drenso_oidc.yaml).
            # Le `redirect_route` doit matcher le `redirect_route` du client OIDC,
            # qui défaut à /login_check côté drenso. On garde le défaut.
            oidc:
                client: default
                user_identifier_property: sub
                # Logout SSO Authentik géré par l'issue #27 (pour l'instant logout local seul).
                enable_end_session_listener: false
                # Sur échec d'auth (notamment OidcAccessGuard qui rejette via
                # CustomUserMessageAuthenticationException), on redirige vers
                # /access-denied au lieu de /login (qui ferait une boucle).
                failure_path: /access-denied

            logout:
                path: app_logout
                target: /

    access_control:
        # /login redirige vers Authentik (point d'entrée OIDC), accessible anonyme
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/access-denied, roles: PUBLIC_ACCESS }
        # Tout le reste exige un user authentifié — les rôles fins sont appliqués
        # par les voters (cf. specs §2 modèle de rôles dynamique)
        - { path: ^/, roles: ROLE_USER }

when@test:
    security:
        firewalls:
            main:
                # Désactivé par défaut en test : les tests fonctionnels qui ont
                # besoin d'un user le forcent via $client->loginUser().
                lazy: false
