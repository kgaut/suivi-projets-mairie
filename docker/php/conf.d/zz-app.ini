; Confs PHP partagées prod + dev
; Le préfixe "zz-" garantit que ce fichier est chargé après les confs par défaut

memory_limit = 256M
date.timezone = Europe/Paris

; Upload : aligné sur les limites métier (cf. docs/specifications.md §3.5)
; PJ internes : 25 Mo / fichier max
upload_max_filesize = 25M
post_max_size = 30M

; OPcache (de base ; surchargé en prod et dev)
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 10000
opcache.jit_buffer_size = 64M
opcache.jit = tracing

; Erreurs : pas d'affichage par défaut (la prod prendra le relais)
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /dev/stderr
