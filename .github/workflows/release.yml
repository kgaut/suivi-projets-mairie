name: Release

on:
  push:
    tags:
      - 'v*.*.*'

# Une seule release en cours à la fois (pas de course sur les tags GHCR).
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write       # création de la GitHub Release
  packages: write       # push GHCR
  id-token: write       # signature OIDC pour cosign (préparé pour plus tard)

jobs:
  build-and-publish:
    name: Build + push GHCR + GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "version_no_v=${VERSION#v}" >> "$GITHUB_OUTPUT"

      - name: Setup QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ !contains(steps.version.outputs.version, '-') }}
            type=sha,format=short
          labels: |
            org.opencontainers.image.title=Suivi Projets Mairie
            org.opencontainers.image.description=Outil interne de gestion de projet pour une mairie
            org.opencontainers.image.licenses=AGPL-3.0-only
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.version_no_v }}

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          target: prod
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version_no_v }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION_NO_V="${{ steps.version.outputs.version_no_v }}"
          # Extrait la section "## [X.Y.Z]" du CHANGELOG, jusqu'à la suivante.
          if [ -f CHANGELOG.md ]; then
            awk -v ver="## \\[${VERSION_NO_V}\\]" '
              $0 ~ ver { found=1; next }
              found && /^## \[/ { exit }
              found
            ' CHANGELOG.md > /tmp/release-notes.md
          fi
          if [ ! -s /tmp/release-notes.md ]; then
            echo "Voir CHANGELOG.md pour le détail des modifications." > /tmp/release-notes.md
          fi
          {
            echo "notes_file=/tmp/release-notes.md"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          body_path: ${{ steps.changelog.outputs.notes_file }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
