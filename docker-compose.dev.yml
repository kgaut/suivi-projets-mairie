# Stack docker compose pour le développement local.
#
# Démarrage :
#   docker compose -f docker-compose.dev.yml up -d
#
# Voir docs/local-dev.md §3 pour le TLS local sur https://spm.localhost.

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: dev
    restart: unless-stopped
    # .env.local optionnel : vars d'override personnelles, créées au besoin
    env_file:
      - path: .env.local
        required: false
    environment:
      APP_ENV: dev
      APP_DEBUG: 1
      # FrankenPHP / Caddy : nom de domaine local + TLS automatique (CA Caddy interne).
      # Voir docs/local-dev.md §3.1 pour installer la CA dans le trust store du host.
      SERVER_NAME: ${DEV_SERVER_NAME:-spm.localhost}
      XDEBUG_MODE: ${XDEBUG_MODE:-off}
      XDEBUG_CLIENT_HOST: ${XDEBUG_CLIENT_HOST:-host.docker.internal}
      DATABASE_URL: postgresql://${POSTGRES_USER:-spm}:${POSTGRES_PASSWORD:-spm}@postgres:5432/${POSTGRES_DB:-spm}?serverVersion=16&charset=utf8
      REDIS_URL: redis://redis:6379
      MAILER_DSN: smtp://mailpit:1025
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    volumes:
      - .:/app:cached
      # Volume nommé pour vendor pour ne pas écraser ce qui est dans l'image
      - vendor:/app/vendor
      # Persiste la CA Caddy locale et les certificats générés entre redémarrages
      - caddy_data:/data
      - caddy_config:/config
    extra_hosts:
      # Permet d'utiliser host.docker.internal sous Linux
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-spm}
      POSTGRES_USER: ${POSTGRES_USER:-spm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-spm}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "8025:8025"  # UI web : http://localhost:8025
      - "1025:1025"  # SMTP (utilisé par MAILER_DSN ci-dessus)
    environment:
      MP_MAX_MESSAGES: 5000

volumes:
  pgdata:
  redisdata:
  vendor:
  caddy_data:
  caddy_config:
